<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Tensai Plus</title>
    <style>
        @font-face {
            font-family: 'Syne-SemiBold';
            src: url('fonts/Syne-SemiBold.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
        }

        /* Fonte solicitada para o título */
        @font-face {
            font-family: 'Syne-SemiBold';
            src: url('fonts/Syne-SemiBold.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Syne-SemiBold', sans-serif;
            background-color: #020802;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* permite rolagem se necessário */
        }

        /* Título com a fonte AnekGurmukhi_Expanded-Regular */
        h2 {
            margin-bottom: 20px;
            font-size: 22px;
            font-weight: 400; /* fica a seu critério; ajuste se quiser mais “peso” */
            font-family: 'Syne-SemiBold', sans-serif;
            text-align: center;
        }

        .login-container {
            background: linear-gradient(180deg, rgba(42, 193, 171, 0.15), rgba(0, 0, 0, 0.5));
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(42, 193, 171, 0.3);
            text-align: center;
            width: 100%;
            max-width: 500px;
            position: relative;
            border: 2px solid rgba(42, 193, 171, 0.5);
            margin: 0 20px; /* evita encostar nas bordas em telas menores */
        }

        .login-container label {
            display: block;
            text-align: left;
            margin-bottom: 5px;
            font-size: 16px;
            color: #2ac1ab;
            font-weight: 600;
            font-family: 'Syne-SemiBold', sans-serif;
        }

        .login-container input {
            width: 100%;
            height: 40px;
            padding: 8px;
            margin-bottom: 12px;
            border: 2px solid transparent;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            outline: none;
            font-size: 15px;
            transition: border-color 0.3s ease-in-out;
            font-family: 'Syne-SemiBold', sans-serif;
        }

        .login-container input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .login-container input:focus {
            border-color: #2ac1ab;
            box-shadow: 0 0 8px rgba(42, 193, 171, 0.5);
        }

        .button-container {
            display: flex;
            justify-content: center; /* centraliza o botão */
            width: 100%;
            margin-top: 20px;
        }

        .login-button {
            width: 250px;
            height: 48px;
            padding: 10px;
            background: linear-gradient(90deg, #2ac1ab, #25b39a);
            border: none;
            border-radius: 40px;
            font-size: 18px;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            transition: background 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Syne-SemiBold', sans-serif;
        }

        .login-button:hover {
            background: linear-gradient(90deg, #25b39a, #219e89);
        }

        .logo {
            margin-top: 30px;
        }

        .logo img {
            width: 100px;
        }

        /* Responsividade para telas menores */
        @media (max-width: 600px) {
            .login-container {
                padding: 20px;
                border-radius: 12px;
            }

            h2 {
                font-size: 20px;
                margin-bottom: 15px;
            }

            .login-container label {
                font-size: 14px;
            }

            .login-container input {
                font-size: 14px;
            }

            .login-button {
                width: 100%;
                font-size: 16px;
            }

            .logo img {
                width: 80px;
            }
        }
    </style>
</head>
<body>
    <h2>Entre com seus dados de login</h2>
    <div class="login-container">
        <form action="#" method="POST">
            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" placeholder="Digite seu e-mail" required>
            
            <label for="password">Senha</label>
            <input type="password" id="password" name="password" placeholder="Digite sua senha" required>

            <div class="button-container">
                <button type="submit" class="login-button">FAZER LOGIN</button>
            </div>
        </form>
    </div>
    
    <div class="logo">
        <img src="https://i.imgur.com/SDjT4sC.png" alt="Tensai Plus Logo">
    </div>
</body>
</html>
